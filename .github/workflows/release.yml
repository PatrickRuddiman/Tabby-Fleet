name: release

# Runs on every push to main. If package.json's version doesn't yet have a
# matching `v<version>` tag, the workflow tags the commit, publishes to npm
# via trusted publishing (OIDC — no NPM_TOKEN required), and creates a GitHub
# release. If the tag already exists, the workflow is a no-op, so normal
# commits don't trigger releases. Cut a new release by bumping the version
# in package.json and pushing.
#
# One-time setup before this workflow can publish (per npm's trusted-publisher
# flow — first publish cannot use OIDC, see npm/cli#8544):
#   1. Publish v0.1.0 once locally with `npm login` + `npm publish` so the
#      package exists on the registry.
#   2. On npmjs.com → package page → Settings → Trusted Publisher → Add:
#        Publisher: GitHub Actions
#        Organization/user: PatrickRuddiman
#        Repository: Tabby-Fleet
#        Workflow filename: release.yml
#        Environment: (leave blank)
#   3. Revoke any classic tokens you used for step 1.
#   4. Future bumps go through this workflow with no secrets.

on:
  push:
    branches: [main]

permissions:
  contents: write   # tag + create release
  id-token: write   # required for npm OIDC trusted publishing

jobs:
  release:
    name: release on version bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: pkg
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          NAME="$(node -p "require('./package.json').name")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "refs/tags/${{ steps.pkg.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.pkg.outputs.tag }} already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No tag for version ${{ steps.pkg.outputs.version }} yet — proceeding."
          fi

      - uses: actions/setup-node@v4
        if: steps.tag_check.outputs.exists == 'false'
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        if: steps.tag_check.outputs.exists == 'false'
        run: npm ci

      - name: Run tests
        if: steps.tag_check.outputs.exists == 'false'
        run: npm test

      - name: Build bundle
        if: steps.tag_check.outputs.exists == 'false'
        run: npm run build

      - name: Tag commit
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.pkg.outputs.tag }}" -m "Release ${{ steps.pkg.outputs.version }}"
          git push origin "${{ steps.pkg.outputs.tag }}"

      - name: Publish to npm (OIDC, no token)
        if: steps.tag_check.outputs.exists == 'false'
        run: npm publish
        # No NODE_AUTH_TOKEN: trusted publishing mints a short-lived OIDC
        # token at publish time. The CLI auto-detects the GHA OIDC env and
        # generates provenance automatically; --provenance is redundant.

      - name: Create GitHub release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pkg.outputs.tag }}
          name: ${{ steps.pkg.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
